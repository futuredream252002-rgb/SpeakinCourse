            from { transform: scale(0.8); opacity: 0; }
            to { transform: scale(1); opacity: 1; }
        }
        .modal-icon {
            width: 80px; height: 80px; border: 4px solid #ffccbc; border-radius: 50%;

            margin: 0 auto 20px; font-size: 40px; color: #ff8a65;

        }

        .status-tag { position: absolute; right: 20px; bottom: 15px; font-size: 0.8rem; font-weight: 600; color: #4ade80; }

.page { 
    display: none;

}

    padding: 15px 20px; 
    box-shadow: 0 -5px 15px rgba(0,0,0,0.1);

    let score = 0;
    selectedVocabQuestions.forEach((item, idx) => {
        let correctAnswer = currentQuizStage === 1 ? item.mm : item.verb;
        if(userVocabAnswers[idx] === correctAnswer) score++;
    });

    const percent = (score / selectedVocabQuestions.length) * 100;
if(percent === 100) {
    if(currentQuizStage === 1) {
        showModal("✅ Stage 1 အောင်မြင်ပါသည်။ Stage 2 ကို ဆက်လက်ဖြေဆိုပါ။");
        currentQuizStage = 2;
        setupVocabQuiz(); 
        window.scrollTo(0, 0);
    } else {
        localStorage.setItem('vocabPassed', 'true');
        showModal("🎉 အောင်မြင်သည့်အတွက် Exercise Lock ပွင့်သွားပါပြီ။");
        currentQuizStage = 1; 
        history.replaceState(null, "", ""); 
        goToPage('mainMenu');
        updateLockUI();
        }
    } else {
        
        showModal(`❌ ရမှတ် ${percent}% သာ ရှိပါသည်။ ၁၀၀% ရမှ နောက်တစ်ဆင့် တက်နိုင်ပါမည်။ မေးခွန်းအသစ်များဖြင့် ပြန်ဖြေကြည့်ပါ။`);
       
        setupVocabQuiz(); 
        window.scrollTo(0, 0);
    }
}

function selectVocabOpt(qIdx, val, btn) {
    userVocabAnswers[qIdx] = val;
    document.querySelectorAll(`.q-${qIdx}`).forEach(b => b.classList.remove('selected'));
    btn.classList.add('selected');
}


function checkVocabLockBeforeEntry() {
    if(localStorage.getItem('vocabPassed') === 'true') {
        goToPage('exercisePage');
    } else {
        showModal("⚠️ Vocabulary Test ကို အရင်ဖြေပြီး ၁၀၀% ရအောင် လုပ်ပေးပါ။");
    }
}

function updateLockUI() {
    const isPassed = localStorage.getItem('vocabPassed') === 'true';
    const exerciseBtn = document.getElementById('exerciseMenuBtn');
    const lockTag = document.getElementById('exerciseLockTag');
    const statusText = document.getElementById('vocabStatusText');
    const statusTag = document.getElementById('vocabStatusTag');

    if (exerciseBtn && lockTag) {
        if (isPassed) {
          
            exerciseBtn.style.opacity = "1";
            exerciseBtn.style.pointerEvents = "auto";
            lockTag.innerText = "🔓 Unlocked";
            lockTag.style.color = "#4ade80";
            if(statusText) statusText.innerText = "အောင်မြင်ပြီး (100%)";
            if(statusTag) {
                statusTag.innerText = "Passed";
                statusTag.style.color = "#4ade80";
            }
        } else {
           
            exerciseBtn.style.opacity = "0.5";
            lockTag.innerText = "🔒 Locked";
            lockTag.style.color = "#ef4444";
            if(statusText) statusText.innerText = "မဖြေရသေးပါ";
            if(statusTag) {
                statusTag.innerText = "Required";
                statusTag.style.color = "#ef4444";
            }
        }
    }
}


const originalOnLoad = window.onload;
window.onload = () => {
    renderVocabList();
    updateInteractionUI();
    checkLockStatus(); 
    updateLockUI();
    if (!history.state) {
        history.replaceState({ page: 'mainMenu' }, "", "");
    }
};

let userSelections = new Array(sentenceList.length).fill(null);
let isAnswersCleared = false;

function showModal(msg) {
    document.getElementById('modalContent').innerText = msg;
    document.getElementById('customModal').style.display = 'flex';
}

function closeModal() {
    document.getElementById('customModal').style.display = 'none';
}

function checkLockStatus() {
    const lockUntil = localStorage.getItem('exerciseLockTime');
    const checkBtn = document.getElementById('checkBtn');
    
    if (lockUntil) {
        const currentTime = new Date().getTime();
        const remainingTime = lockUntil - currentTime;

        if (remainingTime > 0) {
            const mins = Math.ceil(remainingTime / 60000);
            if (checkBtn) {
                checkBtn.disabled = true;
                checkBtn.innerText = `Locked (${mins} mins)`;
            }
            if (mins <= 20 && !isAnswersCleared) {
                clearAllAnswers();
                isAnswersCleared = true;
            }
            return true;
        } else {
            localStorage.removeItem('exerciseLockTime');
            isAnswersCleared = false;
            if (checkBtn) {
                checkBtn.disabled = false;
                checkBtn.innerText = "✅ Check Answers";
            }
        }
    }
    return false;
}

function clearAllAnswers() {
    userSelections = new Array(sentenceList.length).fill(null);
    document.querySelectorAll('.answer-input').forEach(input => {
        input.value = "";
        input.style.borderColor = "#ddd";
        input.style.background = "";
    });
    document.querySelectorAll('[id^="feedback-"]').forEach(fb => {
        fb.style.display = 'none';
        fb.innerHTML = '';
    });
}

function goToPage(pageId, isBackAction = false) {
    const videoPage = document.getElementById('videoPage');
    if (videoPage && videoPage.style.display === 'block') { stopVideo(); }

    document.querySelectorAll('.page, #mainMenu').forEach(p => p.style.display = 'none');
    
    const backBtn = document.getElementById('topBackBtn');
    const headerTitle = document.getElementById('headerTitle');
    const mainHeader = document.querySelector('.header');
    const exerciseFooter = document.getElementById('exerciseFooter');
    const vocabBar = document.querySelector('.vocab-bottom-bar');

    if(vocabBar) vocabBar.style.display = 'none';

    if (pageId === 'videoPage') {
        mainHeader.classList.add('header-hidden');
    } else {
        mainHeader.classList.remove('header-hidden');
    }

    if (!isBackAction) {
        if (pageId === 'mainMenu') {

            history.replaceState({ page: 'mainMenu' }, "", "");
        } else {
            history.pushState({ page: pageId }, "", "");
        }
    }

    if (pageId === 'mainMenu') {
        backBtn.style.display = 'none';
        headerTitle.innerText = "Grammar Lesson-1";
        if (exerciseFooter) exerciseFooter.style.display = 'none';
    } else {
        backBtn.style.display = 'flex';
        if (exerciseFooter) exerciseFooter.style.display = (pageId === 'exercisePage') ? 'flex' : 'none';
        
        if (pageId === 'exercisePage') {
            headerTitle.innerText = "Exercise (30 Questions)";
            renderPosExercise();
            checkLockStatus();
        } else if (pageId === 'vocabListPage') {
            headerTitle.innerText = "Verb List (50 Words)";
            renderVocabList();
        } else if (pageId === 'vocabQuizPage') {
            headerTitle.innerText = "Vocabulary Test";
            currentQuizStage = 1; 
            setupVocabQuiz();
            setTimeout(() => {
                const bar = document.querySelector('.vocab-bottom-bar');
                if(bar) bar.style.display = 'flex';
            }, 50);
        }
    }

    const targetPage = document.getElementById(pageId);
    if (targetPage) targetPage.style.display = 'block';
    window.scrollTo(0, 0);
    updateLockUI();
}

function setupVocabQuiz() {
    selectedVocabQuestions = [...vocabularyList].sort(() => 0.5 - Math.random()).slice(0, 10);

    const container = document.getElementById('vocabQuizContainer');
    userVocabAnswers = {}; 
    
    let stageTitle = currentQuizStage === 1 ? "Stage 1: English to Myanmar" : "Stage 2: Myanmar to English";
    
    container.innerHTML = `
        <h3 style="margin-bottom:10px; text-align:center; color:#7c4dff;">${stageTitle}</h3>
        <p style="text-align:center; margin-bottom:20px; font-size:0.9rem; color:#666;">(၁၀ ပုဒ်လုံး မှန်ကန်ရပါမည်)</p>
    `;
    
    selectedVocabQuestions.forEach((item, idx) => {
        let questionText = currentQuizStage === 1 ? item.verb : item.mm;
        let correctAnswer = currentQuizStage === 1 ? item.mm : item.verb;

        let options = [correctAnswer];
        while(options.length < 4) {
            let randomItem = vocabularyList[Math.floor(Math.random()*vocabularyList.length)];
            let randomAnswer = currentQuizStage === 1 ? randomItem.mm : randomItem.verb;
            if(!options.includes(randomAnswer)) options.push(randomAnswer);
        }
        options.sort(() => 0.5 - Math.random());

        container.innerHTML += `
            <div class="quiz-card">
                <p><b>Question ${idx+1}:</b> What is the meaning of <b>"${questionText}"</b>?</p>
                <div class="quiz-options">
                    ${options.map(opt => `
                        <button class="opt-btn q-${idx}" onclick="selectVocabOpt(${idx}, '${opt}', this)">${opt}</button>
                    `).join('')}
                </div>
            </div>
        `;
    });

    let btnText = currentQuizStage === 1 ? "Next Stage" : "Final Submit";
    let bottomBar = document.querySelector('.vocab-bottom-bar');
    if(!bottomBar) {
        bottomBar = document.createElement('div');
        bottomBar.className = 'vocab-bottom-bar';
        document.body.appendChild(bottomBar);
    }
    bottomBar.innerHTML = `<button class="btn-primary" onclick="checkVocabQuiz()">${btnText}</button>`;
}    

function renderPosExercise() {
    const container = document.getElementById('posQuizContainer');
    if (!container) return;
    
    container.innerHTML = sentenceList.map((item, idx) => `
        <div class="question-block" id="q-block-${idx}">
            <div class="question-text" style="font-weight: bold; margin-bottom: 12px; color: #333; line-height: 1.6;">
                ${item.q}
            </div>
            <input type="text" 
                   class="answer-input" 
                   id="input-${idx}" 
                   placeholder="Type English sentence here...">
            <div id="feedback-${idx}" style="margin-top: 8px; font-size: 0.9rem; display: none;"></div>
        </div>
    `).join('');

    const inputs = document.querySelectorAll('.answer-input');
    inputs.forEach(input => {
        input.addEventListener('focus', function() {
            if (checkLockStatus()) {
                this.blur(); 
                showModal("⚠️ ဆရာသင်ကြားသော သင်ခန်းစာများကို သေချာပြန်လည်လေ့လာပါဦး။");
            } else {
                this.style.borderColor = '#7c4dff';
            }
        });

        input.addEventListener('blur', function() {
            if (!checkLockStatus()) { this.style.borderColor = '#ddd'; }
        });

        input.addEventListener('input', function() {
            if (checkLockStatus()) {
                this.value = ""; 
                this.blur();
            }
        });
    });
}

function handleCheckAnswers() {
    if (checkLockStatus()) {
        showModal("⚠️ ရမှတ် 80% မပြည့်ပါသဖြင့် Lock ကျနေပါသည်\nLock ပွင့်မှ ပြန်ဖြေဆိုနိုင်ပါမည်။");
        return;
    }
    
    let correctCount = 0;
    let allFilled = true;

    sentenceList.forEach((item, idx) => {
        const userInput = document.getElementById(`input-${idx}`).value.trim();
        const feedback = document.getElementById(`feedback-${idx}`);
        const inputField = document.getElementById(`input-${idx}`);

        if (userInput === "") {
            allFilled = false;
            return;
        }

        const isCorrect = userInput.toLowerCase().replace(/[.,?!]/g, "") === 
                          item.a.toLowerCase().replace(/[.,?!]/g, "");

        if (feedback) feedback.style.display = 'block';
        if (isCorrect) {
            correctCount++;
            if (inputField) {
                inputField.style.borderColor = "#28a745";
                inputField.style.background = "#f1f9f1";
            }
            if (feedback) feedback.innerHTML = `<span style="color: #28a745;">✅ Correct!</span>`;
        } else {
            if (inputField) {
                inputField.style.borderColor = "#dc3545";
                inputField.style.background = "#fff5f5";
            }
            if (feedback) feedback.innerHTML = `<span style="color: #dc3545;">❌ Correct: ${item.a}</span>`;
        }
    });

    if (!allFilled) {
        showModal("⚠️ မေးခွန်းအားလုံးကို ဖြေဆိုပေးပါ");
        return;
    }
    
const percent = Math.round((correctCount / sentenceList.length) * 100);
const oldPercent = localStorage.getItem('day4_percent');
if (!oldPercent || percent > parseInt(oldPercent)) {
    localStorage.setItem('day4_percent', percent);
}

    if (percent < 80) {
        const lockTime = new Date().getTime() + (30 * 60 * 1000);
        localStorage.setItem('exerciseLockTime', lockTime);
        checkLockStatus();
        showModal(`❌ ရမှတ် ${percent}% သာရှိပါသည်။ \n 80% မပြည့်ပါသဖြင့် မိနစ် ၃၀ Lock ကျသွားပါမည်။`);
    } else {
        showModal(`🎉 ဂုဏ်ယူပါတယ်! ရမှတ်: ${percent}%\n${correctCount} / ${sentenceList.length} ခု မှန်ကန်ပါသည်။`);
    }
}

let currentLikes = parseInt(localStorage.getItem('videoLikes')) || 9200;
let isLiked = localStorage.getItem('isVideoLiked') === 'true'; 

function updateInteractionUI() {
    const formattedLikes = currentLikes >= 1000 ? (currentLikes / 1000).toFixed(1) + 'k' : currentLikes;
    const likeCountDisplay = document.getElementById('likeCountDisplay');
    if (likeCountDisplay) likeCountDisplay.innerText = formattedLikes;

    const likeBtn = document.getElementById('likeBtn');
    if (likeBtn) {
        if (isLiked) {
            likeBtn.classList.add('liked');
        } else {
            likeBtn.classList.remove('liked');
        }
    }
}

function handleLike() {
    if (isLiked) {
        currentLikes--;
        isLiked = false;
    } else {
        currentLikes++;
        isLiked = true;
    }

    localStorage.setItem('videoLikes', currentLikes);
    localStorage.setItem('isVideoLiked', isLiked);
    updateInteractionUI();
}
function stopVideo() {
    const videoIframe = document.querySelector('#videoPage iframe');
    if (videoIframe) {
        const src = videoIframe.src;
        videoIframe.src = '';
        videoIframe.src = src;
    }
}
function handleShare() {
    showModal("➔ Sharing functionality will be added soon.");
}

window.onpopstate = (event) => {
    stopVideo();
  
    const vocabBar = document.querySelector('.vocab-bottom-bar');
    if(vocabBar) vocabBar.style.display = 'none';

    if (event.state && event.state.page) {
      
        goToPage(event.state.page, true);
    } else {
    
        goToPage('mainMenu', true);
    }
};
