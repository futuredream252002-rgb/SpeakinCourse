    function goToPage(pageId) {
        document.querySelectorAll('.page, #mainMenu').forEach(p => p.style.display = 'none');
        document.getElementById('exerciseFooter').style.display = (pageId === 'exercisePage') ? 'flex' : 'none';
        document.getElementById(pageId).style.display = 'block';
        if (pageId === 'vocabPage') renderVocabTable();
        if (pageId === 'exercisePage') resetExercise();
        window.scrollTo(0, 0);
    }

    function renderVocabTable(filter = "") {
        const container = document.getElementById('vocabListContainer');
        const filtered = vocabularyList.filter(v => v.verb.includes(filter.toLowerCase()) || v.mm.includes(filter));
        container.innerHTML = filtered.map(v => `<div style="display:flex; justify-content:space-between; padding:10px; border-bottom:1px solid #eee"><b>${v.verb}</b> <span>${v.mm}</span></div>`).join('');
    }

    function resetExercise() {
        document.getElementById('vocabTestSection').style.display = 'block';
        document.getElementById('sentenceSection').style.display = 'none';
        document.getElementById('stickyBar').style.display = 'flex';
        renderVocabTest();
    }

    function renderVocabTest() {
        document.getElementById('vocabQuizContainer').innerHTML = vocabularyList.map((item, idx) => `
            <div class="question-block">
                <p>${idx+1}. ${item.mm}</p>
                <input type="text" class="answer-input v-input" data-ans="${item.verb}" placeholder="အဖြေရိုက်ပါ...">
                <div class="result-area"></div>
            </div>
        `).join('');
    }

    function showNotification(msg, scoreStr = "") {
        const bar = document.getElementById('notificationBar');
        bar.innerHTML = `<div>${msg}</div>` + (scoreStr ? `<div class="score-info">${scoreStr}</div>` : "");
        bar.style.top = "20px";
        setTimeout(() => { bar.style.top = "-120px"; }, 4000);
    }

    function handleGlobalCheck() {
        const isVocabMode = document.getElementById('vocabTestSection').style.display !== 'none';
        const inputs = document.querySelectorAll(isVocabMode ? '.v-input' : '.s-input');
        
        // ၁။ အားလုံး ဖြည့်ထားခြင်း ရှိ/မရှိ စစ်ဆေးခြင်း
        let missing = false;
        inputs.forEach(i => { if(i.value.trim() === "") missing = true; });
        if(missing) {
            showNotification("⚠️ Input အားလုံးကို ဖြည့်စွက်ပါ");
            return;
        }

        let correctCount = 0;
        let totalCount = inputs.length;

        inputs.forEach(inp => {
            const resArea = inp.nextElementSibling;
            const userAnswer = inp.value.trim().toLowerCase();
            const correctAnswer = inp.dataset.ans.toLowerCase();
            const isCorrect = userAnswer === correctAnswer;
            
            if (isCorrect) {
                resArea.className = "result-area correct";
                resArea.innerHTML = "✅ အဖြေမှန်ပါတယ်";
                correctCount++;
            } else {
                resArea.className = "result-area incorrect";
                // ၂။ Sentence မှာ မှားရင် အဖြေမှန်ပြပေးခြင်း
                if (!isVocabMode) {
                    resArea.innerHTML = `❌ အဖြေမှားနေပါတယ် <br><b>Correct: ${inp.dataset.ans}</b>`;
                } else {
                    resArea.innerHTML = "❌ အဖြေမှားနေပါတယ်";
                }
            }
            resArea.style.display = "block";
        });

        // ၃။ Score ရေတွက်ခြင်းနှင့် Notification ပို့ခြင်း
        const scoreStr = `ရမှတ်: ${correctCount} / ${totalCount}`;
        if (correctCount === totalCount) {
            showNotification("🎉 ဂုဏ်ယူပါတယ်! အားလုံးမှန်ပါတယ်", scoreStr);
        } else {
            const msg = isVocabMode ? "Vocabulary ပြန်ကျက်ဖို့ လိုအပ်နေပါသေးတယ်" : "Video ကို သေချာဂရုစိုက်ကြည့်ပါဦး";
            showNotification(msg, scoreStr);
        }
    }

    function showConfirm() { document.getElementById('confirmModal').style.display = 'flex'; }
    function closeConfirm() { document.getElementById('confirmModal').style.display = 'none'; }
    
    function confirmSkip() {
        closeConfirm();
        document.getElementById('vocabTestSection').style.display = 'none';
        document.getElementById('stickyBar').style.display = 'none';
        document.getElementById('sentenceSection').style.display = 'block';
        document.getElementById('sentencesQuizContainer').innerHTML = sentenceList.map(s => `
            <div class="question-block">
                <p>${s.q}</p>
                <input type="text" class="answer-input s-input" data-ans="${s.a}" placeholder="အင်္ဂလိပ်လို ပြန်ဆိုပါ...">
                <div class="result-area"></div>
            </div>
        `).join('');
    }
