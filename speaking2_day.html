        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f5f5f5; padding: 20px; margin: 0;
            display: flex; flex-direction: column; align-items: center;
        }

        .header-title {
            width: 100%; max-width: 800px; font-size: 20px;
            font-weight: bold; margin-bottom: 20px; color: #333;
        }

        .container {
            display: grid; grid-template-columns: repeat(auto-fill, minmax(170px, 1fr));
            gap: 15px; width: 100%; max-width: 800px;
        }

        .day-button {
            background: white; border-radius: 15px; border: 1px solid #e0e0e0;
            box-shadow: 0 4px 6px rgba(0,0,0,0.05); display: flex;
            flex-direction: column; overflow: hidden; cursor: pointer;
            transition: all 0.2s; padding: 0; text-align: left; width: 100%;
            position: relative;
        }

        /* Lock ဖြစ်နေပါက မှိန်သွားစေရန် - pointer-events: none မသုံးရပါ (သုံးရင် alert မပြတော့လို့ပါ) */
        .locked {
            filter: grayscale(1); 
            opacity: 0.6;
        }

        .day-button:active:not(.locked) { transform: scale(0.97); }

        .card-body { padding: 15px; flex-grow: 1; }
        .day-label { font-weight: bold; font-size: 15px; margin-bottom: 10px; display: flex; justify-content: space-between; }
        
        .score-tag {
            font-size: 10px; padding: 2px 6px;
            border-radius: 5px; color: #fff; font-weight: bold; display: none;
        }

        .lesson-list { font-size: 11px; color: #666; line-height: 1.6; }
        .card-footer {
            background-color: #6c63ff; color: white; padding: 8px 12px;
            display: flex; justify-content: space-between; font-size: 11px;
        }
        /* Lock ဖြစ်နေတဲ့ Footer အရောင် */
        .locked .card-footer { background-color: #888; }

        @media (max-width: 400px) { .container { grid-template-columns: 1fr 1fr; } }
    </style>
</head>

    <script>
        const PASS_PERCENT = 80;

        function checkLocks() {
    for (let i = 1; i <= 30; i++) {
        const currentPercent = localStorage.getItem(`day${i}_percent`);
        const scoreTag = document.getElementById(`s-${i}`);
        const btn = document.getElementById(`btn-${i}`);
        const footerText = document.getElementById(`f-${i}`);
        
        if (currentPercent && scoreTag) {
            let pVal = parseInt(currentPercent);
            scoreTag.innerText = pVal + "%";
            scoreTag.style.display = 'inline-block';
            scoreTag.style.backgroundColor = (pVal >= PASS_PERCENT) ? "#58cc02" : "#ff4b4b";
        }

        if (i > 1) {
            const prevPercent = localStorage.getItem(`day${i-1}_percent`);
            
            if (prevPercent && parseInt(prevPercent) >= PASS_PERCENT) {
                if (btn) {
                    btn.classList.remove('locked');
                    btn.style.filter = "none";
                    btn.style.opacity = "1";
                }
                if (footerText) footerText.innerText = 'Start Now';
            } else {
                
                if (btn) btn.classList.add('locked');
                if (footerText) footerText.innerText = '🔒 Locked';
            }
        }
    }
}

function go(day) {
    const btn = document.getElementById(`btn-${day}`);
    const currentPercent = localStorage.getItem(`day${day}_percent`);

    if (day > 1 && btn && btn.classList.contains('locked')) {
        Swal.fire({
          title: 'သင်ခန်းစာ ပိတ်ထားပါသည်',
          text: `ရှေ့က Day ${day-1} မှာ 80% ရအောင် အရင်ဖြေဆိုပေးပါ။ ဒါမှ Day ${day} ကို လေ့လာခွင့်ရမှာပါခင်ဗျာ။`,
          icon: 'lock',
          confirmButtonText: 'နားလည်ပါပြီ',
          confirmButtonColor: '#6c63ff'
        });
    } else {
      
        window.location.href = `day${day}.html`;
    }
}
        window.onload = checkLocks;
    </script>
