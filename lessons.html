<!DOCTYPE html>
<html lang="my">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Daily Lessons Plan</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f5f5f5; padding: 20px; margin: 0;
            display: flex; flex-direction: column; align-items: center;
        }

        .header-title {
            width: 100%; max-width: 800px; font-size: 20px;
            font-weight: bold; margin-bottom: 20px; color: #333;
        }

        .container {
            display: grid; grid-template-columns: repeat(auto-fill, minmax(170px, 1fr));
            gap: 15px; width: 100%; max-width: 800px;
        }

        .day-button {
            background: white; border-radius: 15px; border: 1px solid #e0e0e0;
            box-shadow: 0 4px 6px rgba(0,0,0,0.05); display: flex;
            flex-direction: column; overflow: hidden; cursor: pointer;
            transition: all 0.2s; padding: 0; text-align: left; width: 100%;
            position: relative;
        }

        /* Lock ဖြစ်နေပါက မှိန်သွားစေရန် */
        .locked {
            filter: grayscale(1); opacity: 0.6; cursor: not-allowed !important;
        }

        .day-button:active:not(.locked) { transform: scale(0.97); }

        .card-body { padding: 15px; flex-grow: 1; }
        .day-label { font-weight: bold; font-size: 15px; margin-bottom: 10px; display: flex; justify-content: space-between; }
        
        /* Percentage Badge */
        .score-tag {
            font-size: 10px; padding: 2px 6px;
            border-radius: 5px; color: #fff; font-weight: bold; display: none;
        }

        .lesson-list { font-size: 11px; color: #666; line-height: 1.6; }
        .card-footer {
            background-color: #6c63ff; color: white; padding: 8px 12px;
            display: flex; justify-content: space-between; font-size: 11px;
        }
        .locked .card-footer { background-color: #888; }

        @media (max-width: 400px) { .container { grid-template-columns: 1fr 1fr; } }
    </style>
</head>
<body>

    <div class="header-title">Lessons By Daily Plan</div>

    <div class="container">
        <button class="day-button" id="btn-1" onclick="go(1)">
            <div class="card-body">
                <div class="day-label"><span>📅 Day 1</span><span id="s-1" class="score-tag"></span></div>
                <div class="lesson-list">Lesson 1 Content...</div>
            </div>
            <div class="card-footer"><span>🕒 30 min</span><span>Start Now</span></div>
        </button>

        <button class="day-button locked" id="btn-2" onclick="go(2)">
            <div class="card-body">
                <div class="day-label"><span>📅 Day 2</span><span id="s-2" class="score-tag"></span></div>
                <div class="lesson-list">Lesson 2 Content...</div>
            </div>
            <div class="card-footer"><span>🕒 30 min</span><span id="f-2">🔒 Locked</span></div>
        </button>

        <button class="day-button locked" id="btn-3" onclick="go(3)">
            <div class="card-body">
                <div class="day-label"><span>📅 Day 3</span><span id="s-3" class="score-tag"></span></div>
                <div class="lesson-list">Lesson 3 Content...</div>
            </div>
            <div class="card-footer"><span>🕒 21 min</span><span id="f-3">🔒 Locked</span></div>
        </button>

        <button class="day-button locked" id="btn-4" onclick="go(4)">
            <div class="card-body">
                <div class="day-label"><span>📅 Day 4</span><span id="s-4" class="score-tag"></span></div>
                <div class="lesson-list">Lesson 4 Content...</div>
            </div>
            <div class="card-footer"><span>🕒 19 min</span><span id="f-4">🔒 Locked</span></div>
        </button>
        
        </div>

    <script>
        const PASS_PERCENT = 80; // ၈၀ ရာခိုင်နှုန်းရမှ အောင်မည်

        function checkLocks() {
            for (let i = 1; i <= 30; i++) {
                // ၁။ ရာခိုင်နှုန်း (Percentage) ကို Badge မှာ ပြရန်
                const currentPercent = localStorage.getItem(`day${i}_percent`);
                const scoreTag = document.getElementById(`s-${i}`);
                
                if (currentPercent && scoreTag) {
                    let pVal = parseInt(currentPercent);
                    scoreTag.innerText = currentPercent + "%";
                    scoreTag.style.display = 'inline-block';
                    
                    // 80% ပြည့်ရင် အစိမ်း၊ မပြည့်ရင် အနီ
                    scoreTag.style.backgroundColor = (pVal >= PASS_PERCENT) ? "#58cc02" : "#ff4b4b";
                }

                // ၂။ Lock/Unlock Logic (ရှေ့က Day ရဲ့ status ကို စစ်မည်)
                if (i > 1) {
                    const prevStatus = localStorage.getItem(`day${i-1}_status`);
                    const btn = document.getElementById(`btn-${i}`);
                    const footerText = document.getElementById(`f-${i}`);

                    if (prevStatus === "unlocked") {
                        if(btn) btn.classList.remove('locked');
                        if(footerText) footerText.innerText = 'Start Now';
                    }
                }
            }
        }

        function go(day) {
            const btn = document.getElementById(`btn-${day}`);
            if (btn && btn.classList.contains('locked')) {
                alert(`ရှေ့က သင်ခန်းစာမှာ အနည်းဆုံး ${PASS_PERCENT}% ရအောင် အရင်ဖြေဆိုပါ။`);
            } else {
                window.location.href = `day${day}.html`;
            }
        }

        window.onload = checkLocks;
    </script>
</body>
</html>
