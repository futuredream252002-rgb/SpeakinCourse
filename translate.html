<!DOCTYPE html>
<html lang="my">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Redirecting...</title>
    <style>
        body { font-family: sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; background: #f0f2f5; }
        .loader { text-align: center; color: #555; }
    </style>
</head>
<body>
    <div class="loader">
        <p>Google Translate သို့ သွားနေပါသည်။</p>
        <p>ခဏစောင့်ပါ...</p>
    </div>

    <script type="text/javascript">
        function redirectToTranslate() {

            history.pushState({ redirected: true }, "");

            window.location.href = "https://translate.google.com/";
        }

              window.addEventListener('pageshow', function(event) {

            if (event.persisted || (window.performance && window.performance.navigation.type === 2)) {

                window.location.href = "index.html";
            }
        });

        window.onload = function() {
              if (!history.state || !history.state.redirected) {
                redirectToTranslate();
            } else {
                window.location.href = "index.html";
            }
        };
    </script>
</body>
</html>
